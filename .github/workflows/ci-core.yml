name: ci-core

# CI for the shared Cloudflare core: the npm-workspace packages (packages/*) and the
# backend Worker (apps/flea-market/worker). Path-filtered so it only runs when that code
# changes. Checks only — the Worker deploys separately via Cloudflare Workers Builds.
#
# Socket is integrated token-free, same as ci-hackathon-lp-2026 / ci-xymposium-lp:
#   - Socket Firewall Free (`sfw`, mode: firewall-free) wraps `npm ci` and blocks
#     confirmed-malicious packages before they are fetched — no Socket account/token.
#   - The Socket GitHub App (repo-root socket.yml) comments on dependency-changing PRs.
on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/*/worker/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "prettier.config.mjs"
      - ".github/workflows/ci-core.yml"
  pull_request:
    paths:
      - "packages/**"
      - "apps/*/worker/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "prettier.config.mjs"
      - ".github/workflows/ci-core.yml"

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: audit / format / types / test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Audit before install
        run: npm audit --package-lock-only --audit-level=high
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (clean, via Socket Firewall)
        run: sfw npm ci
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Typecheck (packages + worker)
        run: npm run typecheck:packages
      - name: Test (vitest)
        run: npm test
