name: ci-xymposium-lp

# CI for the XYMPOSIUM redirect aggregator (apps/xymposium-lp), a small TypeScript
# Cloudflare Worker. Path-filtered so it only runs when that app changes. Deployment is
# handled separately by Cloudflare Workers Builds (Git integration) — checks only.
#
# Socket is integrated token-free, same as ci-hackathon-lp-2026 / symbol-rest-api-client:
#   - Socket Firewall Free (`sfw`, mode: firewall-free) wraps `npm ci` (and the wrangler
#     dry-run's npx fetch) and blocks confirmed-malicious packages before they are fetched
#     — no Socket account/token required.
#   - The Socket GitHub App (repo-root socket.yml) comments on dependency-changing PRs.
on:
  push:
    branches: [main]
    paths:
      - "apps/xymposium-lp/**"
      - ".github/workflows/ci-xymposium-lp.yml"
  pull_request:
    paths:
      - "apps/xymposium-lp/**"
      - ".github/workflows/ci-xymposium-lp.yml"

concurrency:
  group: ci-xymposium-lp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/xymposium-lp

jobs:
  verify:
    name: audit / types / bundle (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/xymposium-lp/package-lock.json
      - name: Audit before install
        run: npm audit --package-lock-only --audit-level=high
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (clean, via Socket Firewall)
        run: sfw npm ci
      - name: Typecheck
        run: npm run typecheck
      # Bundle-validate the Worker (no upload, no Cloudflare auth needed). The wrangler
      # download via npx is also fetched through the Socket Firewall.
      - name: Bundle check (wrangler deploy --dry-run)
        run: sfw npx --yes wrangler@4 deploy --dry-run
