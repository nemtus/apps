name: ci-xymposium-lp-2024

# CI for the 2024 XYMPOSIUM site (apps/xymposium-lp-2024), a Next.js 16 app. Path-filtered
# so it only runs when that app changes. Deployment is handled separately by Cloudflare
# Workers Builds (Git integration) — this workflow is checks only.
#
# Socket is integrated token-free, same as ci-hackathon-lp-2026 / symbol-rest-api-client:
#   - Socket Firewall Free (`sfw`, mode: firewall-free) wraps every `npm ci` below and
#     blocks confirmed-malicious packages (incl. transitive) before they are fetched —
#     no Socket account/token required.
#   - The Socket GitHub App (repo-root socket.yml) comments on dependency-changing PRs.
on:
  push:
    branches: [main]
    paths:
      - "apps/xymposium-lp-2024/**"
      - ".github/workflows/ci-xymposium-lp-2024.yml"
  pull_request:
    paths:
      - "apps/xymposium-lp-2024/**"
      - ".github/workflows/ci-xymposium-lp-2024.yml"

concurrency:
  group: ci-xymposium-lp-2024-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  STORYBOOK_DISABLE_TELEMETRY: "true"
  DO_NOT_TRACK: "1"

defaults:
  run:
    working-directory: apps/xymposium-lp-2024

jobs:
  quality:
    name: format / lint / types / knip / depcruise / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/xymposium-lp-2024/.nvmrc
          cache: npm
          cache-dependency-path: apps/xymposium-lp-2024/package-lock.json
      # Audit the lockfile before install so a known-bad version is caught before its
      # (deferred) install scripts could ever run. Gate at `high` (same as
      # ci-hackathon-lp-2026): the tree carries one unfixable low advisory in a transitive
      # esbuild (arbitrary file read on the *Windows dev server* only — irrelevant to Linux
      # CI and the deployed Worker), which `info` would fail on with no in-range remedy.
      - name: Audit before install
        run: npm audit --package-lock-only --audit-level=high
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (clean, via Socket Firewall)
        run: sfw npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Dependency rules (dependency-cruiser)
        run: npm run depcruise
      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/xymposium-lp-2024/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/xymposium-lp-2024/package-lock.json') }}-${{ hashFiles('apps/xymposium-lp-2024/**/*.{ts,tsx,js,jsx,mjs,cjs,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('apps/xymposium-lp-2024/package-lock.json') }}-
      - name: Build (Next.js)
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook

  test:
    name: unit / storybook (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/xymposium-lp-2024/.nvmrc
          cache: npm
          cache-dependency-path: apps/xymposium-lp-2024/package-lock.json
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (clean, via Socket Firewall)
        run: sfw npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium (Storybook browser mode)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (on cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: "Run tests (vitest: unit + storybook)"
        run: npm run test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/xymposium-lp-2024/.nvmrc
          cache: npm
          cache-dependency-path: apps/xymposium-lp-2024/package-lock.json
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (clean, via Socket Firewall)
        run: sfw npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (on cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/xymposium-lp-2024/playwright-report/
          retention-days: 7
