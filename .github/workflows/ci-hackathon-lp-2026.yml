name: ci-hackathon-lp-2026

# CI for the Next.js 2026 landing page (apps/hackathon-lp-2026). Path-filtered so it
# only runs when that app changes. Deployment is handled separately by Cloudflare
# Workers Builds (Git integration) — this workflow is checks only.
#
# Socket is integrated token-free, same as symbol-rest-api-client:
#   - Socket Firewall Free (`sfw`, mode: firewall-free) wraps every install below and
#     blocks confirmed-malicious packages (incl. transitive) before they are fetched —
#     no Socket account/token required.
#   - The Socket GitHub App (repo-root socket.yml) comments on dependency-changing PRs.
on:
  push:
    branches: [main]
    paths:
      - "apps/hackathon-lp-2026/**"
      - ".github/workflows/ci-hackathon-lp-2026.yml"
  pull_request:
    paths:
      - "apps/hackathon-lp-2026/**"
      - ".github/workflows/ci-hackathon-lp-2026.yml"

concurrency:
  group: ci-hackathon-lp-2026-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/hackathon-lp-2026

jobs:
  verify:
    name: lint / format / types / build / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (frozen lockfile, via Socket Firewall)
        run: sfw pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: pnpm run format:check
      - name: Type check
        run: pnpm run type:check
      - name: Build (static export)
        run: pnpm run build
      - name: Unit tests (vitest)
        run: pnpm run test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Socket Firewall (firewall-free, no token)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install (frozen lockfile, via Socket Firewall)
        run: sfw pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Build (static export)
        run: pnpm run build
      - name: E2E tests
        run: pnpm run e2e
