name: ci-hackathon-lp-2026

# CI for the Next.js 2026 landing page (apps/hackathon-lp-2026). Path-filtered so it
# only runs when that app changes. Deployment is handled separately by Cloudflare
# Workers Builds (Git integration) — this workflow is checks only.
on:
  push:
    branches: [main]
    paths:
      - "apps/hackathon-lp-2026/**"
      - ".github/workflows/ci-hackathon-lp-2026.yml"
  pull_request:
    paths:
      - "apps/hackathon-lp-2026/**"
      - ".github/workflows/ci-hackathon-lp-2026.yml"

concurrency:
  group: ci-hackathon-lp-2026-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/hackathon-lp-2026

jobs:
  verify:
    name: lint / format / types / build / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: pnpm run format:check
      - name: Type check
        run: pnpm run type:check
      - name: Build (static export)
        run: pnpm run build
      - name: Unit tests (vitest)
        run: pnpm run test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Build (static export)
        run: pnpm run build
      - name: E2E tests
        run: pnpm run e2e

  socket:
    name: socket security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Socket scan
        # Runs only when the API key secret is configured; otherwise it is a no-op
        # so the rest of CI is not blocked before Socket is set up.
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        run: |
          if [ -z "${SOCKET_SECURITY_API_KEY}" ]; then
            echo "SOCKET_SECURITY_API_KEY not set — skipping. Add the repo secret to enable Socket."
            exit 0
          fi
          npx -y @socketsecurity/cli ci
