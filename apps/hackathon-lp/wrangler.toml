# hackathon-lp — the multi-year aggregator/index site, hosted as a Cloudflare
# Worker (Static Assets). Assets-only Worker (no `main`): serves ./public directly.
name = "hackathon-lp"
compatibility_date = "2025-06-01"

[assets]
directory = "./public"
not_found_handling = "404-page"

