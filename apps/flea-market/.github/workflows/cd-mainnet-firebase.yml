name: CD Mainnet Firebase
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    environment: mainnet
    permissions:
      contents: read
      id-token: write # mint the OIDC token for Workload Identity Federation
    strategy:
      matrix:
        node: ['22']
    name: Node ${{ matrix.node }} CD Mainnet Firebase
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Audit root dependencies (fail on high/critical; moderate allowed)
        run: npm audit --audit-level=high
      - run: npm ci
      - run: npm run build:mainnet
      - name: Audit functions dependencies (fail on high/critical; moderate allowed)
        run: npm audit --audit-level=high
        working-directory: ./functions
      - name: Authenticate to Google Cloud (keyless, OIDC + WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - run: npx --package=firebase-tools firebase deploy --project=mainnet --non-interactive --force
