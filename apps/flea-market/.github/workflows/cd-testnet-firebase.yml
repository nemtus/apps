name: CD Testnet Firebase
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    environment: testnet
    permissions:
      contents: read
      id-token: write # mint the OIDC token for Workload Identity Federation
    strategy:
      matrix:
        node: ['22']
    name: Node ${{ matrix.node }} CD Testnet Firebase
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Audit root dependencies (fail on high/critical; moderate allowed)
        run: npm audit --audit-level=high
      - run: npm ci
      - run: npm run build:testnet
      - name: Audit functions dependencies (fail on high/critical; moderate allowed)
        run: npm audit --audit-level=high
        working-directory: ./functions
      - name: Authenticate to Google Cloud (keyless, OIDC + WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - run: npx --package=firebase-tools firebase deploy --project=testnet --non-interactive --force
