name: CI React
on:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout のみ。書き込み権限は不要
    strategy:
      # 1 つのチェックが落ちても他のチェックは最後まで走らせる（全失敗を一覧したい）
      fail-fast: false
      matrix:
        node: ['22']
        task:
          - { name: Lint, run: npm run lint }
          - { name: Format, run: npm run format:check }
          - { name: Typecheck, run: npm run typecheck }
          - { name: Test, run: npm test }
          - { name: Build, run: npm run build }
    name: ${{ matrix.task.name }} (React, Node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Audit dependencies (fail on high/critical; moderate allowed)
        run: npm audit --audit-level=high
      - run: npm ci
      - run: ${{ matrix.task.run }}
