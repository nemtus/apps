version: 2
updates:
  # Frontend (root) npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      root-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Cloud Functions npm dependencies
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      functions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (keeps SHA-pinned actions up to date)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-all:
        update-types:
          - "minor"
          - "patch"
