name: Pinact

on:
  pull_request:

permissions:
  contents: read

jobs:
  pinact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify GitHub Actions are pinned to full commit SHAs
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          # Check-only: fail CI if any action is unpinned or a version comment
          # does not match its SHA. Never modify files.
          fix: 'false'
          verify: 'true'
