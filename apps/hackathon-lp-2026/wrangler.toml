# hackathon-lp-2026 — Next.js 16 (app router) landing page, statically exported and
# hosted on Cloudflare Workers (Static Assets). `next build` with output:'export'
# (see next.config.mjs) writes ./out, which this assets-only Worker (no `main`) serves.
#
# Deployed via Cloudflare Workers Builds (Git-connected — NOT GitHub Actions, so no
# Cloudflare token is stored in GitHub). Configure this Worker once in the Cloudflare
# dashboard (Workers & Pages → connect the nemtus/apps repo) with:
#   Root directory:    apps/hackathon-lp-2026
#   Build command:     pnpm build          (pnpm install runs automatically from pnpm-lock)
#   Deploy command:    npx wrangler deploy
#   Build watch paths: apps/hackathon-lp-2026/*   (so only this site rebuilds)
#   Production branch: main   (PRs get preview URLs; ensure Preview URLs are enabled)
name = "nemtus-hackathon-lp-2026"
compatibility_date = "2025-06-01"

# Custom domain — TEMPORARILY DISABLED for the Vercel → Cloudflare cutover.
# hackathon-2026.nemtus.com currently resolves to Vercel via an existing Cloudflare DNS
# record, so attaching it to this Worker now would fail with a DNS conflict. With this
# commented out, the first Workers Builds deploy reaches the *.workers.dev URL only, for
# safe verification without touching the live site. Re-enable it (uncomment) AFTER
# deleting the Vercel DNS record for this hostname — see the "restore custom domain" PR.
# routes = [{ pattern = "hackathon-2026.nemtus.com", custom_domain = true }]

[assets]
directory = "./out" # Next.js static-export output (built by `pnpm build`; not committed)
not_found_handling = "404-page" # serve /404.html for unmatched paths
