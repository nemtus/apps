name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Audit (info 以上の脆弱性があれば失敗 / level 問わず)
        run: npm audit --audit-level=info
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Dependency rules (dependency-cruiser)
        run: npm run depcruise
      - name: Build (Next.js)
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook

  test:
    name: Unit / Storybook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium (Storybook browser mode 用)
        run: npx playwright install --with-deps chromium
      - name: "Run tests (vitest: unit + storybook)"
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
