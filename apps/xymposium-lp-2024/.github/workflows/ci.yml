name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN は最小権限 (読み取り専用)。書き込みが必要なジョブのみ個別に昇格する。
permissions:
  contents: read

# テレメトリ送信を無効化し、harden-runner の egress 許可リストを最小化する。
env:
  NEXT_TELEMETRY_DISABLED: "1"
  STORYBOOK_DISABLE_TELEMETRY: "true"
  DO_NOT_TRACK: "1"

jobs:
  # GitHub Actions が全て full commit SHA に固定されていることを強制する。
  # 未固定 (タグ/ブランチ参照) があれば pinact が非ゼロ終了して CI を失敗させる。
  actions-pinned:
    name: Verify Actions are SHA-pinned (pinact)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          # まず audit (監視) で運用する。block 化する場合は、この audit 実行で
          # StepSecurity が生成する推奨 allowed-endpoints を適用してから切り替えること。
          # (手作りの許可リストは GitHub のリリース資産 CDN 等を取りこぼし block で CI が壊れる)
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Install pinact
        run: go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.10.1
      - name: Check all Actions are pinned to a full commit SHA
        run: pinact run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}

  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      # install の前に lockfile を監査し、既知の脆弱/悪意パッケージのインストール
      # (= postinstall スクリプト実行) を未然に止める。深刻度を問わず失敗させる。
      - name: Audit before install (info 以上で失敗)
        run: npm audit --package-lock-only --audit-level=info
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Dependency rules (dependency-cruiser)
        run: npm run depcruise
      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,mjs,cjs,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Build (Next.js)
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook

  test:
    name: Unit / Storybook tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium (Storybook browser mode 用)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (キャッシュヒット時)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: "Run tests (vitest: unit + storybook)"
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (キャッシュヒット時)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Cache Next.js build (E2E の webServer build 用)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,mjs,cjs,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
