name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GitHub Actions が全て full commit SHA に固定されていることを強制する。
  # 未固定 (タグ/ブランチ参照) があれば pinact が非ゼロ終了して CI を失敗させる。
  actions-pinned:
    name: Verify Actions are SHA-pinned (pinact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
      - name: Install pinact
        run: go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.10.1
      - name: Check all Actions are pinned to a full commit SHA
        run: pinact run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}

  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Audit (info 以上の脆弱性があれば失敗 / level 問わず)
        run: npm audit --audit-level=info
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Dependency rules (dependency-cruiser)
        run: npm run depcruise
      - name: Build (Next.js)
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook

  test:
    name: Unit / Storybook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium (Storybook browser mode 用)
        run: npx playwright install --with-deps chromium
      - name: "Run tests (vitest: unit + storybook)"
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
