name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN は最小権限 (読み取り専用)。書き込みが必要なジョブのみ個別に昇格する。
permissions:
  contents: read

# テレメトリ送信を無効化し、harden-runner の egress 許可リストを最小化する。
env:
  NEXT_TELEMETRY_DISABLED: "1"
  STORYBOOK_DISABLE_TELEMETRY: "true"
  DO_NOT_TRACK: "1"

jobs:
  # GitHub Actions が全て full commit SHA に固定されていることを強制する。
  # 未固定 (タグ/ブランチ参照) があれば pinact が非ゼロ終了して CI を失敗させる。
  actions-pinned:
    name: Verify Actions are SHA-pinned (pinact)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          # GitHub Actions 基盤は harden-runner が自動許可する。以下は追加の外部宛て。
          # go install (pinact) 用の Go module proxy / checksum DB。
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
      - name: Install pinact
        run: go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.10.1
      - name: Check all Actions are pinned to a full commit SHA
        run: pinact run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}

  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          # npm registry (install/audit, sharp/workerd の prebuilt も registry 経由) +
          # next/font/google (Inter) のビルド時フォント取得。
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            fonts.googleapis.com:443
            fonts.gstatic.com:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      # install の前に lockfile を監査し、既知の脆弱/悪意パッケージのインストール
      # (= postinstall スクリプト実行) を未然に止める。深刻度を問わず失敗させる。
      - name: Audit before install (info 以上で失敗)
        run: npm audit --package-lock-only --audit-level=info
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Dependency rules (dependency-cruiser)
        run: npm run depcruise
      - name: Cache Next.js build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,mjs,cjs,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Build (Next.js)
        run: npm run build
      - name: Build Storybook
        run: npm run build-storybook

  test:
    name: Unit / Storybook tests
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          # npm registry + next/font/google + Playwright ブラウザ DL + --with-deps の apt。
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            fonts.googleapis.com:443
            fonts.gstatic.com:443
            playwright.download.prss.microsoft.com:443
            cdn.playwright.dev:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            azure.archive.ubuntu.com:80
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium (Storybook browser mode 用)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (キャッシュヒット時)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: "Run tests (vitest: unit + storybook)"
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          # npm registry + next/font/google + Playwright ブラウザ DL + --with-deps の apt。
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            fonts.googleapis.com:443
            fonts.gstatic.com:443
            playwright.download.prss.microsoft.com:443
            cdn.playwright.dev:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            azure.archive.ubuntu.com:80
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (キャッシュヒット時)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Cache Next.js build (E2E の webServer build 用)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,mjs,cjs,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
